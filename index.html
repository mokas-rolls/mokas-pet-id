<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mokas ID</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f6f2;
    color:#333;
}

.header{
    background:#6879D0;
    color:white;
    text-align:center;
    padding:25px;
}

.foto{
    width:170px;
    height:300px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    margin-top:20px;
    background:#fff;
}

.card{
    background:white;
    margin:20px;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.boton{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    color:white;
    font-weight:bold;
}

.llamar{
    background:#28a745;
}

.whatsapp{
    background:#25D366;
}

.info{
    margin:8px 0;
}

footer{
    text-align:center;
    color:#777;
    padding:25px;
}

.error{
    text-align:center;
    padding:60px 20px;
}
</style>

</head>

<body>

<div id="contenido">
  <div class="error">Cargando información de la mascota...</div>
</div>

<script>
async function cargarMascota() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const contenido = document.getElementById('contenido');

  if (!id) {
    contenido.innerHTML = '<div class="error">⚠️ Falta el identificador de la mascota en el link.<br>Ejemplo: index.html?id=moka</div>';
    return;
  }

  try {
    const respuesta = await fetch(`data/${id}.json`);
    if (!respuesta.ok) throw new Error('No encontrado');
    const m = await respuesta.json();

    document.title = `${m.nombre} · Mokas ID`;

    contenido.innerHTML = `
      <div class="header">
        <img class="foto" src="${m.foto}" alt="Foto de ${m.nombre}" />
        <h1>${m.nombre}</h1>
        <p>🐾 Ayúdame a volver a casa ❤️</p>
      </div>

      <div class="card">
        <a class="boton llamar" href="tel:${m.telefono}">📞 Llamar</a>
        <a class="boton whatsapp" href="https://wa.me/${m.whatsapp}">💬 WhatsApp</a>
      </div>

      <div class="card">
        <h2>Información</h2>
        ${m.info.map(linea => `<p class="info">${linea}</p>`).join('')}
      </div>

      <footer>Creado con ❤️ por Mokas Rolls</footer>
    `;
  } catch (e) {
    contenido.innerHTML = '<div class="error">⚠️ No se encontró información para esta mascota.</div>';
  }
}

cargarMascota();
</script>

</body>
</html>
